
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .error-message {
      font-size: 20px;
      line-height: 1.6;
      text-align: center;
      max-width: 800px;
    }
  </style>
</head>
<body>
  <div class="error-message" id="errorMessage">Error loading message</div>

  <script>
    // Get error message from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const errorMsg = urlParams.get('msg') || urlParams.get('message');
    
    const errorMessageElement = document.getElementById('errorMessage');
    
    if (errorMsg) {
      // Decode and display the error message
      errorMessageElement.textContent = decodeURIComponent(errorMsg);
    } else {
      errorMessageElement.textContent = 'An unknown error occurred';
    }
  </script>
</body>
</html>
